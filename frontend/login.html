<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MindMap Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-area">
                <div class="logo-icon">📋</div>
                <h1 class="app-name">MindMap Studio</h1>
                <p class="app-tagline">Organize your projects visually</p>
            </div>

            <h2 class="form-title">Welcome back!</h2>

            <div class="error-box" id="errorBox" style="display:none;"></div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" />
            </div>

            <div class="remember-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe" />
                    Remember me
                </label>
            </div>

            <button class="btn-primary" onclick="handleLogin()">Login</button>

            <p class="switch-link">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
