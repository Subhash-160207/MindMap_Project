<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MindMap Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-area">
                <div class="logo-icon">📋</div>
                <h1 class="app-name">MindMap Studio</h1>
                <p class="app-tagline">Organize your projects visually</p>
            </div>

            <h2 class="form-title">Create your account</h2>

            <div class="error-box" id="errorBox" style="display:none;"></div>
            <div class="success-box" id="successBox" style="display:none;"></div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" />
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" />
            </div>

            <button class="btn-primary" onclick="handleSignup()">Create Account</button>

            <p class="switch-link">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/signup.js"></script>
</body>
</html>
